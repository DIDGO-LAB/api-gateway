spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-api
              uri: ${USER_SERVICE_URI:http://user-service:8080}
              predicates:
                - Path=/api/auth/**,/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user-service
            - id: training-service-api
              uri: ${TRAINING_SERVICE_URI:http://training-service:8080}
              predicates:
                - Path=/api/trainings/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: trainingServiceCircuitBreaker
                    fallbackUri: forward:/fallback/training-service
            - id: training-service-social-voice-ws
              uri: ${TRAINING_SERVICE_WS_URI:ws://training-service:8080}
              predicates:
                - Path=/ws/trainings/social/voice
            - id: user-service-openapi
              uri: ${USER_SERVICE_URI:http://user-service:8080}
              predicates:
                - Path=/user-service/v3/api-docs,/user-service/v3/api-docs/**
              filters:
                - StripPrefix=1
            - id: training-service-openapi
              uri: ${TRAINING_SERVICE_URI:http://training-service:8080}
              predicates:
                - Path=/training-service/v3/api-docs,/training-service/v3/api-docs/**
              filters:
                - StripPrefix=1
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173}
                allowed-methods:
                  - GET
                  - POST
                  - PATCH
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: '*'
                exposed-headers:
                  - Authorization
                  - X-Request-Id
                allow-credentials: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: User Service API
        url: /user-service/v3/api-docs
      - name: Training Service API
        url: /training-service/v3/api-docs/external-training
      - name: Training Service Internal API
        url: /training-service/v3/api-docs/internal-training

resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
      trainingServiceCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
  timelimiter:
    instances:
      userServiceCircuitBreaker:
        timeout-duration: 3s
      trainingServiceCircuitBreaker:
        timeout-duration: 3s

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:user-service}
