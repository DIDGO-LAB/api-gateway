spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-api
              uri: ${USER_SERVICE_URI:http://user-service:8080}
              predicates:
                - Path=/api/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user-service
            - id: user-service-docs
              uri: ${USER_SERVICE_URI:http://user-service:8080}
              predicates:
                - Path=/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user-service
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173}
                allowed-methods:
                  - GET
                  - POST
                  - PATCH
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: '*'
                exposed-headers:
                  - Authorization
                  - X-Request-Id
                allow-credentials: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
  timelimiter:
    instances:
      userServiceCircuitBreaker:
        timeout-duration: 3s

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:user-service}
